<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- T20 & CricsDB brand mark — italic oxblood ampersand on cream.
       Scales from 16×16 (tab) to 512×512 (PWA). The ampersand is the
       signature visual of the masthead; at tab size the word T20
       wouldn't read anyway. -->
  <rect width="64" height="64" fill="#FAF7F0"/>
  <text x="32" y="48"
        text-anchor="middle"
        font-family="Fraunces, Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="500"
        font-size="48"
        fill="#7A1F1F">&amp;</text>
</svg>
