<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,144,400&display=block" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 512px; height: 512px;
    background: #FAF7F0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .amp {
    font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 420px;
    line-height: 0.75;
    color: #7A1F1F;
    font-variation-settings: 'opsz' 144;
    letter-spacing: -0.02em;
    /* nudge down — italic & has a lot of bottom weight, sits low otherwise */
    transform: translateY(2%);
  }
</style>
</head>
<body><span class="amp">&amp;</span></body>
</html>
